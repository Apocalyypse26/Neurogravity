# Render Blueprint - NEUROX Deployment
# Deploying the Finalized v2.5 Node.js Backend

services:
  # Backend API Service (Node.js v2.5)
  - type: web
    name: neurox-api
    region: oregon
    repo: https://github.com/Apocalyypse26/NEUROX.git
    branch: main
    rootDir: neurox-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        value: https://www.neuroxscan.fun,https://neurogravity.vercel.app,https://neuroxscan.fun
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_SECRET_KEY
        sync: false
      - key: CLOUDFLARE_R2_ENDPOINT
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
