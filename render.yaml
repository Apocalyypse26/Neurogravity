# Render Blueprint - NEUROX Deployment
# Deploy both backend and frontend services

services:
  # Backend API Service
  - type: web
    name: neurox-api
    region: oregon
    repo: https://github.com/Apocalyypse26/NEUROX.git
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /api/health
    envVars:
      - key: USE_REAL_TRIBE
        value: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://neurogravity.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JOB_CLEANUP_INTERVAL_SECONDS
        value: 300
      - key: MAX_JOB_AGE_SECONDS
        value: 3600

