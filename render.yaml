# Render Blueprint - NEUROX Deployment
# Deploy both backend and frontend services

services:
  # Backend API Service
  - type: web
    name: neurox-api
    region: oregon
    repo: https://github.com/YOUR_USERNAME/neurogravity.git
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: USE_REAL_TRIBE
        value: false
      - key: CORS_ORIGINS
        # Update this with your Vercel frontend URL after deployment
        value: https://neurogravity.vercel.app,https://*.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0

